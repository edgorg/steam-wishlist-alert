<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Comparison</title>
  <link rel="stylesheet" href="../popup/popup.css">
  <style>
    body {
      width: 100%;
      max-height: 100vh;
      padding: 20px;
    }

    .compare-page {
      max-width: 450px;
      margin: 0 auto;
    }

    .compare-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .compare-page-title {
      font-size: 16px;
      font-weight: 600;
    }

    .compare-page-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .compare-page-close:hover {
      color: var(--text-primary);
    }

    .compare-page-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .key-resellers-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .key-resellers-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .key-resellers-note {
      font-size: 9px;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 8px;
    }

    .key-reseller-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .key-reseller-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 11px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .key-reseller-link:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .key-reseller-icon {
      width: 14px;
      height: 14px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="compare-page">
    <div class="compare-page-header">
      <span class="compare-page-title" id="compare-title">Loading...</span>
      <button class="compare-page-close" id="close-btn">x</button>
    </div>
    <div class="compare-page-list" id="compare-list"></div>
  </div>

  <script src="../services/config.js"></script>
  <script src="../services/steam-api.js"></script>
  <script src="../services/itad-api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const appId = params.get("appId");
    const name = params.get("name");

    document.getElementById("compare-title").textContent = name || "Compare Prices";

    document.getElementById("close-btn").addEventListener("click", () => {
      window.close();
    });

    const keyResellers = [
      { name: "Loaded", url: "https://www.loaded.com/?q=", icon: "https://cdn.loaded.com/media/favicon/default/loaded_fav.png" },
      { name: "G2A", url: "https://www.g2a.com/search?query=", icon: "https://www.g2a.com/favicon.ico" },
      { name: "Kinguin", url: "https://www.kinguin.net/catalogsearch/result/?q=", icon: "https://www.kinguin.net/favicon.ico" },
      { name: "Eneba", url: "https://www.eneba.com/store?text=", icon: "https://www.eneba.com/favicon.ico" },
      { name: "Instant Gaming", url: "https://www.instant-gaming.com/en/search/?q=", icon: "https://www.instant-gaming.com/favicon.ico" },
      { name: "AllKeyShop", url: "https://www.allkeyshop.com/blog/catalogue/search-", icon: "https://www.allkeyshop.com/favicon.ico" }
    ];

    function buildSteamHtml(steamDeals, cheapest, hasUniqueCheapest, symbol) {
      if (steamDeals.length === 0) return "";
      let html = '<div class="compare-group-label">Steam</div>';
      html += steamDeals.map(deal => renderItem(deal, cheapest, hasUniqueCheapest, symbol, appId)).join("");
      return html;
    }

    function buildOtherStoresHtml(otherDeals, cheapest, hasUniqueCheapest, symbol) {
      if (otherDeals.length === 0) return "";
      let html = '<div class="compare-group-label">Other Stores</div>';
      html += otherDeals.map(deal => renderItem(deal, cheapest, hasUniqueCheapest, symbol, null)).join("");
      return html;
    }

    function buildKeyResellersHtml(gameName) {
      const encoded = encodeURIComponent(gameName);
      let html = `
        <div class="key-resellers-section">
          <div class="key-resellers-title">Key Resellers</div>
          <div class="key-resellers-note">Third-party marketplaces — prices may vary, buy at your own discretion</div>
          <div class="key-reseller-list">
      `;
      for (const reseller of keyResellers) {
        const searchUrl = reseller.url + encoded;
        html += `
          <a class="key-reseller-link" href="${searchUrl}" target="_blank">
            <img class="key-reseller-icon" src="${reseller.icon}" alt="" onerror="this.style.display='none'">
            ${reseller.name}
          </a>
        `;
      }
      html += `</div></div>`;
      return html;
    }

    async function loadPrices() {
      // Get section order from settings
      const orderData = await new Promise(resolve => {
        chrome.storage.local.get(["compareSectionOrder"], resolve);
      });
      const sectionOrder = orderData.compareSectionOrder || ["steam", "otherStores", "keyResellers"];

      const deals = await ITAD_API.getDealsForSteamApp(appId, name);

      if (!deals || deals.length === 0) {
        let html = '<p style="text-align:center;color:var(--text-muted);padding:20px;">No deals found for this game</p>';
        html += buildKeyResellersHtml(name);
        document.getElementById("compare-list").innerHTML = html;
        return;
      }

      // Remove duplicates
      const unique = [];
      const seen = new Set();
      for (const deal of deals) {
        const key = `${deal.store}-${deal.price}`;
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(deal);
        }
      }

      // Split into Steam and others
      const steamDeals = unique.filter(d => d.isSteam);
      const otherDeals = unique.filter(d => !d.isSteam).sort((a, b) => a.price - b.price);

      // Find cheapest
      const cheapest = Math.min(...unique.map(d => d.price));
      const cheapestCount = unique.filter(d => d.price === cheapest).length;
      const hasUniqueCheapest = cheapestCount === 1;

      // Currency
      const dealCurrency = unique[0]?.currency || "GBP";
      const symbols = { "GBP": "\u00A3", "USD": "$", "EUR": "\u20AC" };
      const symbol = symbols[dealCurrency] || dealCurrency + " ";

      // Build sections based on saved order
      const sections = {
        steam: buildSteamHtml(steamDeals, cheapest, hasUniqueCheapest, symbol),
        otherStores: buildOtherStoresHtml(otherDeals, cheapest, hasUniqueCheapest, symbol),
        keyResellers: buildKeyResellersHtml(name)
      };

      let html = "";
      for (const sectionId of sectionOrder) {
        html += sections[sectionId] || "";
      }

      document.getElementById("compare-list").innerHTML = html;

      // Click handlers for deal items
      document.querySelectorAll(".compare-modal-item").forEach(item => {
        item.addEventListener("click", () => {
          const url = item.dataset.url;
          if (url) chrome.tabs.create({ url });
        });
      });
    }

    function renderItem(deal, cheapest, hasUniqueCheapest, symbol, steamAppId) {
      const isCheapest = hasUniqueCheapest && deal.price === cheapest;
      const url = deal.isSteam && steamAppId ? `https://store.steampowered.com/app/${steamAppId}` : deal.dealUrl;
      const iconUrl = `https://www.isthereanydeal.com/images/shops/${deal.storeId}-1.svg`;

      let historyHtml = "";
      if (deal.storeLow !== null && deal.storeLow < deal.price) {
        historyHtml = `<span class="compare-history-low">Store low: ${symbol}${deal.storeLow.toFixed(2)}</span>`;
      } else if (deal.historyLow !== null && deal.historyLow < deal.price) {
        historyHtml = `<span class="compare-history-low">All-time low: ${symbol}${deal.historyLow.toFixed(2)}</span>`;
      }

      return `
        <div class="compare-modal-item ${isCheapest ? 'cheapest' : ''}" data-url="${url}">
          <div class="compare-modal-store-info">
            <img class="compare-store-icon" src="${iconUrl}" alt="" onerror="this.style.display='none'">
            <div class="compare-store-details">
              <span class="compare-modal-store">${deal.store}</span>
              ${historyHtml}
            </div>
            ${isCheapest ? '<span class="cheapest-badge">Best price</span>' : ''}
          </div>
          <div class="compare-price-details">
            <span class="compare-modal-price ${hasUniqueCheapest && !isCheapest ? 'not-cheapest' : ''}">${symbol}${deal.price.toFixed(2)}</span>
            ${deal.discount > 0 ? `<span class="compare-modal-discount">-${deal.discount}%</span>` : ''}
          </div>
        </div>
      `;
    }

    // Apply theme
    chrome.storage.local.get(["theme"], (data) => {
      const theme = data.theme || "dark";
      if (theme === "system") {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      } else {
        document.documentElement.setAttribute("data-theme", theme);
      }
    });

    loadPrices();
  </script>
</body>
</html>
