<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Wishlist Alerts</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top-row">
        <h1 class="title">Steam Wishlist Alerts</h1>
        <div class="header-actions">
          <button class="header-btn" id="check-now-btn" title="Check prices now">
            <svg viewBox="0 0 24 24" class="header-btn-icon"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          </button>
          <button class="header-btn" id="clear-btn" title="Clear all games">
            <svg viewBox="0 0 24 24" class="header-btn-icon"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>
      </div>
      <span id="last-checked" class="last-checked"></span>
    </header>

    <!-- Search / Add Game -->
    <div class="search-section">
      <div class="search-input-group">
        <input type="text" id="search-input" class="search-input" placeholder="Search and add a game...">
      </div>
      <div id="search-results" class="search-results hidden"></div>
    </div>

    <!-- Import from current page -->
    <div id="import-section" class="import-section hidden">
      <button id="import-page-btn" class="import-page-btn">Import Wishlist From This Page</button>
    </div>

    <!-- Deals section -->
    <div id="deals-section" class="section hidden">
      <div class="section-header">
        <h2 class="section-title deals-title">On Sale Now</h2>
        <span id="deals-count" class="badge"></span>
      </div>
      <div id="deals-list" class="game-list"></div>
    </div>

    <!-- Tracked games section -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">Watching</h2>
        <span id="watching-count" class="badge"></span>
      </div>
      <div id="games-list" class="game-list"></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <p>No games tracked yet</p>
      <p class="empty-hint">Visit your <a href="https://store.steampowered.com/wishlist/" target="_blank" class="steam-link">Steam Wishlist</a> to import games, or search above to add individually</p>
    </div>

    <!-- Import reminder -->
    <div id="import-hint" class="import-hint hidden">
      <p>Want to import your full wishlist?</p>
      <a href="https://store.steampowered.com/wishlist/" target="_blank" class="import-link">Visit your Steam Wishlist page</a>
    </div>
  </div>

  <script src="../services/steam-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
